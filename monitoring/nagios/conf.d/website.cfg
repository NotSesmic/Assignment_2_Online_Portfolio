# -----------------------------------------------------------------
# Availability monitoring for the portfolio website.
#
# This container is attached to the "kind" docker network (see
# docker-compose.yml), so it can resolve the cluster's node container
# by name — no IP lookup needed. If your cluster isn't named "kind"
# (i.e. you ran `kind create cluster --name something-else`), the
# container is called `something-else-control-plane` instead.
# Verify with: docker ps --filter "name=control-plane"
# -----------------------------------------------------------------

define host {
    use                     generic-host
    host_name               portfolio-website
    alias                   Client Portfolio Website
    address                 kind-control-plane
    max_check_attempts      3
    check_period            24x7
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               portfolio-website
    service_description     HTTP Availability
    check_command           check_http_health
    check_interval          1
    retry_interval          1
    max_check_attempts      3
}

# check_http ships with the base image; -p sets the NodePort, -u the
# health path, -e the expected HTTP status line.
define command {
    command_name    check_http_health
    command_line    $USER1$/check_http -H $HOSTADDRESS$ -p 30080 -u /health -e "200 OK"
}
