apiVersion: v1
kind: Service

metadata:
  name: portfolio-website

spec:
  type: NodePort

  selector:
    app: portfolio-website

  ports:
    - name: app
      port: 8080
      targetPort: 8080
      nodePort: 30080

    - name: actuator
      port: 9090
      targetPort: 9090
      nodePort: 30090
