apiVersion: apps/v1
kind: Deployment

metadata:
  name: portfolio-website

spec:
  replicas: 2

  selector:
    matchLabels:
      app: portfolio-website

  template:
    metadata:
      labels:
        app: portfolio-website

    spec:
      containers:
        - name: portfolio-website

          image: portfolio-website:v1

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080   # app
            - containerPort: 9090   # actuator

          env:
            - name: MANAGEMENT_GRAPHITE_METRICS_EXPORT_HOST
              value: "graphite"
            - name: MANAGEMENT_GRAPHITE_METRICS_EXPORT_PORT
              value: "2003"

          # Requests/limits are what Grafana's resource-utilization
          # dashboards actually chart against (usage vs. what was asked for).
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Actuator's health endpoint — same idea as the external
          # Nagios check, just internal to Kubernetes. JVM startup is
          # slower than the old Node version, hence the longer delays.
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
