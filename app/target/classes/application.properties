# ==========================
# Application
# ==========================
spring.application.name=portfolio
server.port=8080

# ==========================
# Actuator
# ==========================
management.server.port=9090
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

# ==========================
# Graphite Metrics Export
# ==========================
management.graphite.metrics.export.enabled=true
management.graphite.metrics.export.host=graphite
management.graphite.metrics.export.port=2003
management.graphite.metrics.export.protocol=plaintext
management.graphite.metrics.export.step=10s

# Metric Tags — "pod" resolves from the OS env var HOSTNAME, which
# Kubernetes sets to the pod name automatically. Without this, every
# replica's metrics would land on the exact same Graphite path and
# overwrite each other instead of showing as separate series.
management.metrics.tags.application=portfolio
management.metrics.tags.pod=${HOSTNAME:unknown}
